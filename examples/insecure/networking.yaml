# Deliberately INSECURE networking for demonstrating kube-sentinel findings.
---
apiVersion: v1
kind: Service
metadata:
  name: web-nodeport
  namespace: demo
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
---
apiVersion: v1
kind: Service
metadata:
  name: web-lb
  namespace: demo
spec:
  type: LoadBalancer
  selector:
    app: web
  ports:
    - port: 443
      targetPort: 8443
---
apiVersion: v1
kind: Service
metadata:
  name: external-ip-svc
  namespace: demo
spec:
  selector:
    app: web
  externalIPs:
    - 203.0.113.10
  ports:
    - port: 80
      targetPort: 80
# Note: namespace 'demo' runs workloads but ships NO NetworkPolicy here,
# which kube-sentinel flags as KS-NET-003.
