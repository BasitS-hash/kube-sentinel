name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + type + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check src tests

      - name: Ruff (format check)
        run: ruff format --check src tests

      - name: Mypy (type check)
        run: mypy

      - name: Pytest (with coverage)
        run: pytest --cov=kube_sentinel --cov-report=term-missing --cov-fail-under=85

      - name: Smoke test the CLI
        run: |
          kube-sentinel --version
          kube-sentinel scan examples/insecure --fail-on CRITICAL || test $? -eq 1
          kube-sentinel scan examples/hardened --fail-on HIGH
